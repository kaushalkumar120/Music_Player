<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Music Player Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f2f2f2;
            --card: #ffffff;
            --text: #222;
            --accent: #ff4b6e;
            --secondary: #666;
            --hover: #eee;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --secondary: #aaa;
            --hover: #333;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.3s ease;
        }

        .player {
            background: var(--card);
            color: var(--text);
            padding: 30px;
            width: 360px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
        }

        .cover {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid var(--accent);
            background: #eee;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: spin 12s linear infinite;
            animation-play-state: paused;
        }

        .player.play img {
            animation-play-state: running;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .info h3 { margin: 10px 0 5px; font-size: 1.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { margin: 0; color: var(--secondary); font-size: 0.9rem; }

        .progress-area { margin: 25px 0 10px; }

        .progress-container {
            background: #ddd;
            height: 6px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            background: var(--accent);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--secondary);
            font-weight: 600;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
        }

        .controls button {
            border: none;
            background: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
            transition: 0.2s;
        }

        .controls button:hover { color: var(--accent); transform: scale(1.1); }
        .controls .play-btn { font-size: 50px; color: var(--accent); }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="range"] { cursor: pointer; accent-color: var(--accent); height: 4px; }

        .song-list {
            margin-top: 20px;
            max-height: 140px;
            overflow-y: auto;
            text-align: left;
            border-top: 1px solid var(--hover);
            padding-top: 10px;
        }

        .song {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 10px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .song:hover { background: var(--hover); }
        .song.active { background: var(--accent); color: white; font-weight: bold; }

        .toggle {
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: var(--hover);
        }

        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

<div class="player" id="player">
    <div class="cover">
        <img id="cover" src="" alt="Album Art">
    </div>

    <div class="info">
        <h3 id="title">Loading...</h3>
        <p id="artist">Please wait</p>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <div class="progress-area">
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        <div class="time-info">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>
    </div>

    <div class="controls">
        <button id="prev"><i class="fas fa-step-backward"></i></button>
        <button id="play" class="play-btn"><i class="fas fa-play-circle"></i></button>
        <button id="next"><i class="fas fa-step-forward"></i></button>
    </div>

    <div class="volume-container">
        <i class="fas fa-volume-down"></i>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
        <i class="fas fa-volume-up"></i>
    </div>

    <div class="song-list" id="songList"></div>

    <div class="toggle" id="modeToggle">
        <i class="fas fa-moon"></i> Switch Theme
    </div>
</div>

<script>
    const player = document.getElementById("player");
    const playBtn = document.getElementById("play");
    const audio = document.getElementById("audio");
    const progress = document.getElementById("progress");
    const progressContainer = document.getElementById("progress-container");
    const volume = document.getElementById("volume");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const cover = document.getElementById("cover");
    const songList = document.getElementById("songList");
    const toggle = document.getElementById("modeToggle");
    const currTimeText = document.getElementById("current-time");
    const durationText = document.getElementById("duration");

    // Yahan maine har gaane ki alag cover image set ki hai
    const songs = [
        { 
            title: "Ocean Waves", 
            artist: "Relax Music", 
            cover: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400", 
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" 
        },
        { 
            title: "Morning Breeze", 
            artist: "Nature Sounds", 
            cover: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400", 
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" 
        },
        { 
            title: "City Nights", 
            artist: "Synthwave", 
            cover: "https://images.unsplash.com/photo-1514525253344-f81bad3b7c2a?w=400", 
            src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" 
        },
        { 
            title: "Khatu Shyam Bhajan", 
            artist: "Shyam Baba", 
            cover: "https://images.unsplash.com/photo-1582510003544-4d00b7f74220?w=400", 
            src: "Khatu_Shyam_Bhajan.mp3" 
        },
        { 
            title: "Har Har Mahadev", 
            artist: "Shiv Song", 
            cover: "https://images.unsplash.com/photo-1610473068533-9f5b08064a7c?w=400", 
            src: "Namo_Namo.mp3" 
        },
        { 
            title: "Lofi", 
            artist: "Mood Off", 
            cover: "https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=400", 
            src: "Sanam.mp3" 
        },
        { 
            title: "Haryanvi", 
            artist: "Mind Relax", 
            cover: "https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400", 
            src: "Fortuner.mp3" 
        }
    ];

    let songIndex = 0;

    function loadSong(song) {
        title.innerText = song.title;
        artist.innerText = song.artist;
        audio.src = song.src;
        cover.src = song.cover; // Image yahan change ho rahi hai
        updateActiveSong();
    }

    function playSong() {
        player.classList.add("play");
        playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>';
        audio.play().catch(e => console.log("Play error:", e));
    }

    function pauseSong() {
        player.classList.remove("play");
        playBtn.innerHTML = '<i class="fas fa-play-circle"></i>';
        audio.pause();
    }

    playBtn.addEventListener("click", () => {
        const isPlaying = player.classList.contains("play");
        isPlaying ? pauseSong() : playSong();
    });

    function nextSong() {
        songIndex = (songIndex + 1) % songs.length;
        loadSong(songs[songIndex]);
        playSong();
    }

    function prevSong() {
        songIndex = (songIndex - 1 + songs.length) % songs.length;
        loadSong(songs[songIndex]);
        playSong();
    }

    document.getElementById("next").addEventListener("click", nextSong);
    document.getElementById("prev").addEventListener("click", prevSong);

    audio.addEventListener("timeupdate", () => {
        const { duration, currentTime } = audio;
        if (duration) {
            const progressPercent = (currentTime / duration) * 100;
            progress.style.width = `${progressPercent}%`;
            currTimeText.innerText = formatTime(currentTime);
        }
    });

    audio.addEventListener("loadedmetadata", () => {
        durationText.innerText = formatTime(audio.duration);
    });

    function formatTime(time) {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60);
        return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }

    progressContainer.addEventListener("click", (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    });

    volume.addEventListener("input", (e) => {
        audio.volume = e.target.value;
    });

    toggle.addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        toggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> Light Mode' : '<i class="fas fa-moon"></i> Dark Mode';
    });

    function loadPlaylist() {
        songList.innerHTML = "";
        songs.forEach((song, index) => {
            const div = document.createElement("div");
            div.classList.add("song");
            div.innerHTML = `<span>${song.title}</span> <small>${song.artist}</small>`;
            div.addEventListener("click", () => {
                songIndex = index;
                loadSong(songs[songIndex]);
                playSong();
            });
            songList.appendChild(div);
        });
    }

    function updateActiveSong() {
        const allSongs = document.querySelectorAll(".song");
        allSongs.forEach((el, idx) => {
            if(idx === songIndex) {
                el.classList.add("active");
                el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                el.classList.remove("active");
            }
        });
    }

    window.addEventListener("keydown", (e) => {
        if(e.code === "Space") { e.preventDefault(); playBtn.click(); }
    });

    loadPlaylist();
    loadSong(songs[songIndex]);
    audio.addEventListener("ended", nextSong);
</script>

</body>
</html>
